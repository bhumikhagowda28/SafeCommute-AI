<!DOCTYPE html>
<html>
<head>
<title>SafeCommute AI</title>
<style>
body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
text-align:center;
}

.container{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

button{
background:#4CAF50;
color:white;
padding:10px 20px;
border:none;
border-radius:5px;
margin-top:10px;
}

input{
padding:10px;
width:80%;
margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<h1>SafeCommute AI</h1>

<p>Smart Journey Planner for Safer Urban Travel</p>

<input type="text" placeholder="Enter Destination">

<br>

<button onclick="showRoute()">Find Safe Route</button>

<h3 id="result"></h3>

<button onclick="showSOS()">SOS Emergency</button>

<p id="sos"></p>

</div>

<script>

function showRoute(){
document.getElementById("result").innerHTML=
"Recommended Route Safety Score: 92/100";
}

function showSOS(){
document.getElementById("sos").innerHTML=
"Emergency Alert Sent!";
}

</script>

</body>
</html>
